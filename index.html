<!DOCTYPE html>

<html lang="hi">

<head>

    <meta charset="UTF-8">

    <title>My AI Assistant - myra </title>

    <style>

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #ui-layer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ff69b4; text-align: center; pointer-events: none; text-shadow: 0 0 10px #ff0000; }

        #video-input { position: absolute; bottom: 10px; right: 10px; width: 150px; border: 2px solid #ff69b4; border-radius: 10px; transform: scaleX(-1); }

        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }

    </style>

</head>

<body>



    <div id="canvas-container"></div>

    <video id="video-input" autoplay></video>

    

    <div id="ui-layer">

        <h1 id="status-text">  ❤️</h1>

        <p>हवा में चुटकी बजाएं (Pinch) - आकार बदलने के लिए</p>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>



    <script>

        let scene, camera, renderer, particles, positions, colors;

        let currentShape = 'heart';

        const particleCount = 6000;



        // 1. Scene Setup

        function init() {

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            camera.position.z = 30;



            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);

            document.getElementById('canvas-container').appendChild(renderer.domElement);



            const geometry = new THREE.BufferGeometry();

            positions = new Float32Array(particleCount * 3);

            colors = new Float32Array(particleCount * 3);



            const material = new THREE.PointsMaterial({

                size: 0.15,

                vertexColors: true,

                transparent: true,

                blending: THREE.AdditiveBlending

            });



            particles = new THREE.Points(geometry, material);

            scene.add(particles);

            updateShape('heart');

            animate();

        }



        // 2. Shape Logic (गणितीय आकार)

        function updateShape(type) {

            const posAttr = particles.geometry.attributes.position;

            const colorAttr = particles.geometry.attributes.color;



            for (let i = 0; i < particleCount; i++) {

                let x, y, z, r, g, b;

                const t = (i / particleCount) * Math.PI * 2;



                if (type === 'heart') {

                    x = 16 * Math.pow(Math.sin(t), 3);

                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                    z = (Math.random() - 0.5) * 5;

                    r = 1; g = 0.2; b = 0.5; // Pinkish Red

                } else if (type === 'saturn') {

                    if (i < particleCount * 0.6) { // Sphere

                        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.6));

                        const theta = Math.sqrt(particleCount * 0.6 * Math.PI) * phi;

                        x = 8 * Math.cos(theta) * Math.sin(phi);

                        y = 8 * Math.sin(theta) * Math.sin(phi);

                        z = 8 * Math.cos(phi);

                    } else { // Rings

                        const ringT = Math.random() * Math.PI * 2;

                        x = (12 + Math.random() * 4) * Math.cos(ringT);

                        y = (12 + Math.random() * 4) * Math.sin(ringT);

                        z = (Math.random() - 0.5) * 2;

                    }

                    r = 0.9; g = 0.8; b = 0.5; // Golden Saturn

                } else if (type === 'rose') {

                    const angle = i * 0.1;

                    const radius = 0.5 * angle;

                    x = radius * Math.cos(angle);

                    y = radius * Math.sin(angle);

                    z = angle * 0.5;

                    r = 1; g = 0; b = 0.2; // Red Rose

                }



                positions[i * 3] = x;

                positions[i * 3 + 1] = y;

                positions[i * 3 + 2] = z;



                colors[i * 3] = r;

                colors[i * 3 + 1] = g;

                colors[i * 3 + 2] = b;

            }

            particles.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            particles.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        }



        // 3. Hand Tracking (मीडियापाइप)

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });



        hands.onResults((results) => {

            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {

                const hand = results.multiHandLandmarks[0];

                const index = hand[8]; // Index Finger

                const thumb = hand[4]; // Thumb



                // Pinch Gesture to Change Shape

                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);

                if (dist < 0.05) {

                    const shapes = ['heart', 'saturn', 'rose'];

                    currentShape = shapes[(shapes.indexOf(currentShape) + 1) % shapes.length];

                    updateShape(currentShape);

                    document.getElementById('status-text').innerText = "Changing for myra...";

                    setTimeout(() => { document.getElementById('status-text').innerText = "myra  ❤️"; }, 1000);

                }



                // Follow Hand

                particles.position.x = (index.x - 0.5) * -50;

                particles.position.y = (index.y - 0.5) * -30;

                particles.rotation.y += 0.01;

            }

        });



        const videoElement = document.getElementById('video-input');

        const cameraUtils = new Camera(videoElement, {

            onFrame: async () => { await hands.send({image: videoElement}); },

            width: 640, height: 480

        });

        cameraUtils.start();



        function animate() {

            requestAnimationFrame(animate);

            particles.rotation.z += 0.002;

            renderer.render(scene, camera);

        }



        init();

        window.addEventListener('resize', () => {

            camera.aspect = window.innerWidth / window.innerHeight;

            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);

        });

    </script>

</body>

</html>
